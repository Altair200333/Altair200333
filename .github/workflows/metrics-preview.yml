name: Metrics preview - calendar and habits

on:
  workflow_dispatch:

jobs:
  github-metrics-preview:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: Altair200333
          filename: metrics.preview.calendar-habits.svg
          base: ""
          config_display: columns
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year
          plugin_habits: yes
          plugin_habits_from: 500
          plugin_habits_days: 30
          plugin_habits_facts: yes
          plugin_habits_charts: yes
          plugin_habits_charts_type: graph
          plugin_habits_trim: yes
          plugin_habits_languages_limit: 0
          config_timezone: Asia/Novosibirsk
          retries: 3
          retries_delay: 60
          plugins_errors_fatal: yes
