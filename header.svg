  <line x1="367.5" y1="58" x2="367.5" y2="180" stroke="var(--line)"/>

  <text x="400" y="68" class="small green">$ ./status</text>
  <text x="400" y="94" class="heading">Full-stack Helldiver</text>
  <text x="400" y="116" class="body muted">deployed on the bug frontline</text>

  <text x="400" y="141" class="small muted">mission</text>
  <text x="498" y="141" class="small">squash bugs</text>
  <text x="400" y="162" class="small muted">uptime</text>
  <text x="498" y="162" class="small green">24/7</text>
  <text x="400" y="183" class="small muted">timezone</text>
  <text x="498" y="183" class="small yellow">UTC+7</text>

  <line x1="20" y1="207.5" x2="810" y2="207.5" stroke="var(--line)"/>
  <text x="40" y="234" class="small green">$ cat /etc/motd</text>
  <text x="40" y="260" class="body">managed performance, unmanaged agents</text>
  <rect x="314" y="249" width="8" height="14" rx="1" fill="var(--text)" opacity=".82"/>
