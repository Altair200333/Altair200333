<svg xmlns="http://www.w3.org/2000/svg" width="830" height="280" viewBox="0 0 830 280" role="img" aria-labelledby="title desc">
  <title id="title">NE0CK terminal profile header</title>
  <desc id="desc">ASCII NE0CK wordmark, Full Stack Helldiver deployed on Bugs frontline, and a compact terminal status.</desc>
  <style>
    :root {
      --bg: #f6f8fa;
      --bar: #ffffff;
      --border: #d0d7de;
      --text: #24292f;
      --muted: #57606a;
      --blue: #0969da;
      --green: #1a7f37;
      --yellow: #9a6700;
      --red: #cf222e;
      --line: #d8dee4;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #161b22;
        --bar: #0d1117;
        --border: #30363d;
        --text: #c9d1d9;
        --muted: #8b949e;
        --blue: #58a6ff;
        --green: #3fb950;
        --yellow: #d29922;
        --red: #f85149;
        --line: #30363d;
      }
    }
    text {
      font-family: "Cascadia Mono", "SFMono-Regular", Consolas, "Liberation Mono", monospace;
      fill: var(--text);
    }
    .ascii { font-size: 12.2px; font-weight: 600; fill: var(--blue); }
    .tiny { font-size: 11px; }
    .small { font-size: 12px; }
    .label { font-size: 13px; font-weight: 600; letter-spacing: 1.6px; }
    .tagline { font-size: 13px; font-weight: 600; letter-spacing: .65px; }
    .muted { fill: var(--muted); }
    .blue { fill: var(--blue); }
    .green { fill: var(--green); }
    .yellow { fill: var(--yellow); }
  </style>

