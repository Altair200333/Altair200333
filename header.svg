    <rect x="152" y="133" width="9" height="9" rx="1"/>
    <rect x="188" y="133" width="9" height="9" rx="1"/>
    <rect x="161" y="142" width="27" height="9" rx="1"/>
    <rect x="217" y="106" width="27" height="9" rx="1"/>
