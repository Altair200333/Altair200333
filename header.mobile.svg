    <rect x="150" y="111" width="9" height="9" rx="1"/>
    <rect x="114" y="120" width="45" height="9" rx="1"/>
    <rect x="114" y="129" width="9" height="9" rx="1"/>
    <rect x="123" y="138" width="27" height="9" rx="1"/>
    <rect x="179" y="84" width="27" height="9" rx="1"/>
    <rect x="170" y="93" width="9" height="9" rx="1"/>
    <rect x="206" y="93" width="9" height="9" rx="1"/>
