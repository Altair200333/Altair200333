    <rect x="197" y="102" width="18" height="9" rx="1"/>
    <rect x="170" y="111" width="9" height="9" rx="1"/>
    <rect x="188" y="111" width="9" height="9" rx="1"/>
    <rect x="206" y="111" width="9" height="9" rx="1"/>
    <rect x="170" y="120" width="18" height="9" rx="1"/>
    <rect x="206" y="120" width="9" height="9" rx="1"/>
    <rect x="170" y="129" width="9" height="9" rx="1"/>
    <rect x="206" y="129" width="9" height="9" rx="1"/>
    <rect x="179" y="138" width="27" height="9" rx="1"/>
    <rect x="235" y="102" width="27" height="9" rx="1"/>
    <rect x="226" y="111" width="9" height="9" rx="1"/>
    <rect x="262" y="111" width="9" height="9" rx="1"/>
