    <rect x="282" y="84" width="9" height="9" rx="1"/>
    <rect x="282" y="93" width="9" height="9" rx="1"/>
    <rect x="282" y="102" width="9" height="9" rx="1"/>
    <rect x="309" y="102" width="9" height="9" rx="1"/>
    <rect x="282" y="111" width="9" height="9" rx="1"/>
    <rect x="300" y="111" width="9" height="9" rx="1"/>
