  <line x1="20" y1="174.5" x2="370" y2="174.5" stroke="var(--line)"/>

  <text x="24" y="202" class="small green">$ ./status</text>
  <text x="24" y="230" class="heading">Full-stack Helldiver</text>
  <text x="24" y="253" class="body muted">deployed on the bug frontline</text>

  <text x="24" y="287" class="small muted">mission</text>
  <text x="122" y="287" class="small">squash bugs</text>
  <text x="24" y="311" class="small muted">uptime</text>
  <text x="122" y="311" class="small green">24/7</text>
  <text x="24" y="335" class="small muted">timezone</text>
  <text x="122" y="335" class="small yellow">UTC+7</text>

  <line x1="20" y1="360.5" x2="370" y2="360.5" stroke="var(--line)"/>
  <text x="24" y="389" class="small green">$ cat /etc/motd</text>
  <text x="24" y="419" class="body">managed performance,</text>
  <text x="24" y="440" class="body">unmanaged agents</text>
  <rect x="154" y="429" width="8" height="14" rx="1" fill="var(--text)" opacity=".82"/>
